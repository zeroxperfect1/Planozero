name: 🚀 Deploy a planozero.cl

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build y Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: 📦 Instalar dependencias
        run: npm ci

      # 4. Generar config.php con credenciales desde Secrets (NO va al repo)
      - name: 🔐 Generar config.php
        run: |
          cat > public/api/config.php << 'PHPEOF'
          <?php
          define('DB_HOST', '${{ secrets.MYSQL_HOST }}');
          define('DB_NAME', '${{ secrets.MYSQL_DB }}');
          define('DB_USER', '${{ secrets.MYSQL_USER }}');
          define('DB_PASS', '${{ secrets.MYSQL_PASS }}');
          define('FIREBASE_PROJECT_ID', 'gen-lang-client-0646534496');
          define('ADMIN_EMAIL', 'raul.mella.castro@gmail.com');
          define('ADMIN_UID', 'uZQFMbDHTvXcCPzKqW37P35vUCt1');
          define('UPLOADS_DIR', dirname(__DIR__) . '/uploads/');
          define('UPLOADS_URL', '/uploads/');

          function getDB(): PDO {
              static $pdo = null;
              if ($pdo === null) {
                  $dsn = 'mysql:host='.DB_HOST.';dbname='.DB_NAME.';charset=utf8mb4';
                  $pdo = new PDO($dsn, DB_USER, DB_PASS, [
                      PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                      PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                      PDO::ATTR_EMULATE_PREPARES => false,
                  ]);
              }
              return $pdo;
          }

          function setCorsHeaders(): void {
              $origin = $_SERVER['HTTP_ORIGIN'] ?? '*';
              header('Access-Control-Allow-Origin: ' . $origin);
              header('Access-Control-Allow-Credentials: true');
              header('Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS');
              header('Access-Control-Allow-Headers: Content-Type, Authorization');
              header('Content-Type: application/json; charset=utf-8');
              if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(204); exit; }
          }

          function jsonOk($data, int $code = 200): void {
              http_response_code($code);
              echo json_encode($data, JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES);
              exit;
          }

          function jsonError(string $message, int $code = 400): void {
              http_response_code($code);
              echo json_encode(['error' => $message], JSON_UNESCAPED_UNICODE);
              exit;
          }

          function base64UrlDecode(string $input): string {
              $r = strlen($input) % 4;
              if ($r) $input .= str_repeat('=', 4 - $r);
              return base64_decode(strtr($input, '-_', '+/'));
          }

          function getGooglePublicKeys(): array {
              $cacheFile = sys_get_temp_dir() . '/firebase_keys.json';
              if (file_exists($cacheFile) && (time() - filemtime($cacheFile)) < 3600) {
                  return json_decode(file_get_contents($cacheFile), true) ?? [];
              }
              $url = 'https://www.googleapis.com/robot/v1/metadata/x509/securetoken@system.gserviceaccount.com';
              $ch = curl_init($url);
              curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
              curl_setopt($ch, CURLOPT_TIMEOUT, 10);
              curl_setopt($ch, CURLOPT_SSL_VERIFYPEER, true);
              $content = curl_exec($ch);
              curl_close($ch);
              if ($content === false) return file_exists($cacheFile) ? json_decode(file_get_contents($cacheFile), true) ?? [] : [];
              file_put_contents($cacheFile, $content);
              return json_decode($content, true) ?? [];
          }

          function verifyFirebaseToken(string $token): ?array {
              $parts = explode('.', $token);
              if (count($parts) !== 3) return null;
              [$hB64, $pB64, $sB64] = $parts;
              $header  = json_decode(base64UrlDecode($hB64), true);
              $payload = json_decode(base64UrlDecode($pB64), true);
              if (!$header || !$payload) return null;
              if (($payload['exp'] ?? 0) < time()) return null;
              if (($payload['iss'] ?? '') !== 'https://securetoken.google.com/' . FIREBASE_PROJECT_ID) return null;
              if (($payload['aud'] ?? '') !== FIREBASE_PROJECT_ID) return null;
              $certs = getGooglePublicKeys();
              $kid = $header['kid'] ?? '';
              if (!isset($certs[$kid])) return null;
              $pubKey = openssl_pkey_get_public($certs[$kid]);
              if (!$pubKey) return null;
              $verified = openssl_verify($hB64 . '.' . $pB64, base64UrlDecode($sB64), $pubKey, OPENSSL_ALGO_SHA256);
              if ($verified !== 1) return null;
              return $payload;
          }

          function requireAuth(): array {
              $h = $_SERVER['HTTP_AUTHORIZATION'] ?? '';
              if (!str_starts_with($h, 'Bearer ')) jsonError('No autenticado', 401);
              $p = verifyFirebaseToken(substr($h, 7));
              if (!$p) jsonError('Token inválido', 401);
              return $p;
          }

          function requireAdmin(): array {
              $p = requireAuth();
              if (($p['email'] ?? '') !== ADMIN_EMAIL && ($p['user_id'] ?? '') !== ADMIN_UID) jsonError('No autorizado', 403);
              return $p;
          }

          function generateId(): string { return bin2hex(random_bytes(12)); }
          function getBody(): array { return json_decode(file_get_contents('php://input'), true) ?? []; }
          function nowISO(): string { return (new DateTime())->format('c'); }
          PHPEOF

      # 5. Build de producción
      - name: 🔨 Build de producción
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}

      # 6. Asegurarse que uploads/ existe localmente antes de FTP
      - name: 📁 Crear uploads/ si no existe
        run: mkdir -p uploads

      # 7. Deploy frontend compilado (HTML + JS + CSS + assets)
      - name: 📡 Deploy Frontend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.planozero.cl
          username: deploy@planozero.cl
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/client/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/blog/**
            **/portfolio/**
          dangerous-clean-slate: false
          state-name: .ftp-state-frontend
          log-level: standard

      # 8. Deploy imágenes del blog (force-upload con clean-slate para garantizar subida)
      - name: 🖼️ Deploy Blog Images
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.planozero.cl
          username: deploy@planozero.cl
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/client/blog/
          server-dir: ./blog/
          dangerous-clean-slate: true
          log-level: standard

      # 9. Deploy imágenes del portafolio
      - name: 🖼️ Deploy Portfolio Images
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.planozero.cl
          username: deploy@planozero.cl
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/client/portfolio/
          server-dir: ./portfolio/
          dangerous-clean-slate: true
          log-level: standard

      # 10. Deploy carpeta uploads/
      - name: 🖼️ Sync uploads/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.planozero.cl
          username: deploy@planozero.cl
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./uploads/
          server-dir: ./uploads/
          dangerous-clean-slate: false
          log-level: minimal

      # 11. Deploy API PHP completa (incluye config.php generado)
      - name: 🐘 Deploy PHP API
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.planozero.cl
          username: deploy@planozero.cl
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/api/
          server-dir: ./api/
          dangerous-clean-slate: false
          log-level: standard

      # 12. Notificación de éxito
      - name: ✅ Deploy completado
        if: success()
        run: echo "🎉 Deploy exitoso a planozero.cl en $(date)"

