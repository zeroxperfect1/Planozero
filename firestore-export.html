<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Exportar Firestore → MySQL</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
  h1 { color: #fff; }
  button { background: #FF5F1F; color: #fff; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 6px; margin: 8px 4px; }
  #output { background: #000; padding: 16px; border-radius: 8px; white-space: pre-wrap; max-height: 60vh; overflow-y: auto; font-size: 12px; }
  .ok { color: #0f0; } .err { color: #f44; } .info { color: #ff0; }
</style>
</head>
<body>
<h1>🔄 Exportador Firestore → MySQL</h1>
<p style="color:#aaa">Abre esta página mientras estás autenticado en planozero.cl</p>

<button onclick="exportAll()">📦 Exportar TODO de Firestore</button>
<button onclick="importToMySQL()">🚀 Importar a MySQL (planozero.cl/api)</button>
<button onclick="copyJSON()">📋 Copiar JSON</button>

<div id="output">Presiona "Exportar TODO de Firestore" para comenzar...</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  projectId: "gen-lang-client-0646534496",
  appId: "1:65968928791:web:a2fe505a038f9a10378452",
  apiKey: "AIzaSyDih4SyurjOi8FSysMGUzr0ARJGlcOmILM",
  authDomain: "gen-lang-client-0646534496.firebaseapp.com",
  databaseId: "ai-studio-70ea9f7b-cc5b-43f8-ac6f-140160042b91",
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const log = (msg, cls='') => {
  const out = document.getElementById('output');
  out.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  out.scrollTop = out.scrollHeight;
};

let exportedData = {};

onAuthStateChanged(auth, user => {
  if (user) log(`✅ Autenticado como: ${user.email}`, 'ok');
  else log('⚠️  No autenticado — abre planozero.cl primero, luego vuelve aquí', 'err');
});

const COLLECTIONS = ['posts', 'pages', 'menus', 'contacts', 'media', 'logs', 'contentTypes', 'dynamicContent'];

window.exportAll = async () => {
  document.getElementById('output').innerHTML = '';
  exportedData = {};
  log('🔍 Exportando colecciones de Firestore...\n', 'info');

  for (const col of COLLECTIONS) {
    try {
      const snap = await getDocs(collection(db, col));
      exportedData[col] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      log(`  ✅ ${col}: ${exportedData[col].length} documentos`, 'ok');
    } catch(e) {
      log(`  ❌ ${col}: ${e.message}`, 'err');
      exportedData[col] = [];
    }
  }

  log('\n📋 JSON exportado:', 'info');
  log(JSON.stringify(exportedData, null, 2));
};

window.copyJSON = () => {
  navigator.clipboard.writeText(JSON.stringify(exportedData, null, 2));
  log('\n✅ JSON copiado al portapapeles', 'ok');
};

window.importToMySQL = async () => {
  if (!Object.keys(exportedData).length) {
    log('⚠️  Primero exporta los datos', 'err'); return;
  }
  const API = 'https://planozero.cl/api';
  const token = await auth.currentUser?.getIdToken();
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

  log('\n🚀 Importando posts a MySQL...', 'info');
  let ok = 0, err = 0;
  for (const post of (exportedData.posts || [])) {
    try {
      const r = await fetch(`${API}/posts.php`, {
        method: 'POST', headers,
        body: JSON.stringify({
          title:     post.title || 'Sin título',
          slug:      post.slug  || post.id,
          content:   post.content || '',
          excerpt:   post.excerpt || post.resumen || '',
          category:  post.category || post.categoria || 'General',
          image:     post.image || post.imageUrl || post.imagen || '',
          keywords:  post.keywords || post.tags?.join(',') || '',
          published: post.published !== false,
        })
      });
      if (r.ok) { ok++; log(`  ✅ Post: "${post.title}"`, 'ok'); }
      else { err++; log(`  ❌ Post "${post.title}": ${await r.text()}`, 'err'); }
    } catch(e) { err++; log(`  ❌ ${e.message}`, 'err'); }
  }
  log(`\n✅ Posts importados: ${ok} | ❌ Errores: ${err}`, ok > 0 ? 'ok' : 'err');
};
</script>
</body>
</html>
