## ¿Qué es realmente una arquitectura de marca?

Una arquitectura de marca es el conjunto de decisiones estratégicas y visuales que determinan cómo una organización se presenta al mundo de forma coherente, independientemente del medio, soporte o contexto. Incluye:

- **Identidad visual**: logo, tipografía, paleta cromática, iconografía, fotografía
- **Identidad verbal**: tono de voz, nomenclatura, mensajes clave, narrativa corporativa
- **Identidad sensorial**: sonido, textura, olor (en entornos físicos), movimiento (en entornos digitales)
- **Identidad experiencial**: cómo se siente interactuar con la marca en cada punto de contacto

## El error del logo-centrismo

Las marcas que invierten solo en un logo bonito sin construir el sistema detrás descubren, tarde o temprano, que su identidad se fragmenta. El área de marketing usa una tipografía, el departamento de ventas usa otra. El sitio web tiene un tono formal, las redes sociales uno informal. El resultado: una marca que parece tener múltiples personalidades.

**3. Manual de normas técnicas**
El sistema se protege con documentación. Un manual de marca no es un catálogo de ejemplos bonitos: es un documento técnico que define exactamente cómo usar cada elemento, qué está permitido y qué está prohibido.

**4. Gobernanza de la identidad**

## ¿Qué es un sistema de diseño?

Un sistema de diseño es un conjunto documentado de principios, componentes y guías que permiten a cualquier persona de la organización crear productos y materiales que se vean y funcionen como parte de la misma marca.

No es solo una guía de estilo. Es una infraestructura viva que incluye:

- **Design tokens**: los valores atómicos del sistema (colores, tipografías, espaciados, radios, sombras)
- **Biblioteca de componentes**: elementos de UI reutilizables (botones, formularios, tarjetas, modales)
- **Patrones de interacción**: cómo se comportan los componentes en diferentes contextos
- **Documentación**: principios, reglas de uso, ejemplos de qué hacer y qué no hacer
- **Código**: implementación en el o los frameworks que usa el equipo de desarrollo

window.seedPostsIA = async function() {
  const log = document.getElementById('log');
  const btn = document.getElementById('btnSeedIA');
  btn.disabled = true;
  btn.textContent = 'Publicando posts IA...';

  let created = 0;
  for (const post of window.POSTS_IA) {
    try {
      log.innerHTML += '<span class="ok">→ Creando: ' + post.title.substring(0,55) + '...\n</span>';
      const token = await window._auth.currentUser.getIdToken(true);
      const user  = window._auth.currentUser;

      const res = await fetch('/api/posts.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          ...post,
          published: true,
          author:       user.displayName || user.email,
          authorImage:  user.photoURL    || '',
          author_id:    user.uid,
          author_email: user.email
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);

      created++;
      log.innerHTML += '<span class="done">  ✓ Publicado (id: ' + (data.id || 'ok') + ')\n</span>';
    } catch(e) {
      log.innerHTML += '<span class="err">  ✗ Error: ' + e.message + '\n</span>';
    }
    log.scrollTop = log.scrollHeight;
  }

  log.innerHTML += '\n<span class="done">══════════════════════════════\n';

};

        log.innerHTML += '<span class="done">  ✓ "' + post.title.substring(0,40) + '..." imagen actualizada\n</span>';
      } catch(e) {
        log.innerHTML += '<span class="err">  ✗ ' + post.slug + ': ' + e.message + '\n</span>';
      }
      log.scrollTop = log.scrollHeight;
    }

    log.innerHTML += '\n<span class="done">══════════════════════════════\n';
    log.innerHTML += updated + '/' + posts.length + ' imágenes actualizadas a Unsplash.\n</span>';
    log.innerHTML += '<span class="ok">Recarga /blog para verificar.\n</span>';
  } catch(e) {
    log.innerHTML += '<span class="err">✗ Error: ' + e.message + '\n</span>';
  }

  btn.textContent = '✓ Imágenes actualizadas';
};

window.seedPosts = async function() {
  const log = document.getElementById('log');
  const btn = document.getElementById('btnSeed');
  btn.disabled = true;
  btn.textContent = 'Publicando...';
  
  let created = 0;
  for (const post of window.POSTS) {
    try {
      log.innerHTML += '<span class="ok">→ Creando: ' + post.title.substring(0,50) + '...\n</span>';
      const token = await window._auth.currentUser.getIdToken(true);
      
      const res = await fetch('/api/posts.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          ...post,
          published: true,
          author_id: window._auth.currentUser.uid,
          author_email: window._auth.currentUser.email
        })
      });
      
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
      
      created++;
      log.innerHTML += '<span class="done">  ✓ Publicado (id: ' + (data.id || 'ok') + ')\n</span>';
    } catch(e) {
      log.innerHTML += '<span class="err">  ✗ Error: ' + e.message + '\n</span>';
    }
    log.scrollTop = log.scrollHeight;
  }
  
  log.innerHTML += '\n<span class="done">══════════════════════════════\n';
  log.innerHTML += created + '/5 posts publicados correctamente.\n</span>';
  
  if (created > 0) {
    log.innerHTML += '<span class="ok">Puedes ir a /blog para verlos.\n</span>';
  }
  
  btn.textContent = '✓ Completado';
};
</script>
