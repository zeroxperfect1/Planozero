Existe un error conceptual que cometen la mayoría de las empresas cuando piensan en su marca: confunden el **logo** con la **identidad**. El logo es apenas la punta del iceberg. Lo que vive debajo —invisible pero estructurante— es el sistema completo.

## ¿Qué es realmente una arquitectura de marca?

Una arquitectura de marca es el conjunto de decisiones estratégicas y visuales que determinan cómo una organización se presenta al mundo de forma coherente, independientemente del medio, soporte o contexto. Incluye:

- **Identidad visual**: logo, tipografía, paleta cromática, iconografía, fotografía
- **Identidad verbal**: tono de voz, nomenclatura, mensajes clave, narrativa corporativa
- **Identidad sensorial**: sonido, textura, olor (en entornos físicos), movimiento (en entornos digitales)
- **Identidad experiencial**: cómo se siente interactuar con la marca en cada punto de contacto

## El error del logo-centrismo

Las marcas que invierten solo en un logo bonito sin construir el sistema detrás descubren, tarde o temprano, que su identidad se fragmenta. El área de marketing usa una tipografía, el departamento de ventas usa otra. El sitio web tiene un tono formal, las redes sociales uno informal. El resultado: una marca que parece tener múltiples personalidades.

## Los cuatro pilares del sistema de identidad

**1. Posicionamiento estratégico**
Antes de diseñar cualquier elemento visual, necesitas saber con precisión: ¿quién eres, para quién eres, qué problema resuelves y en qué eres diferente? Sin esto, el diseño es decoración.

**2. Sistema visual escalable**
Un buen sistema visual funciona en una tarjeta de presentación y en un billboard de 20 metros. Funciona en blanco y negro y en color. Funciona en digital e impreso. Si no funciona en todos estos contextos, no es un sistema robusto.

**3. Manual de normas técnicas**
El sistema se protege con documentación. Un manual de marca no es un catálogo de ejemplos bonitos: es un documento técnico que define exactamente cómo usar cada elemento, qué está permitido y qué está prohibido.

**4. Gobernanza de la identidad**
¿Quién aprueba el uso de la marca? ¿Qué pasa cuando un proveedor externo necesita crear materiales? La gobernanza define los procesos que garantizan la coherencia en el tiempo.

## Conclusión

Tu marca es un activo estratégico. Tratarla como tal significa invertir en construir un sistema completo, no solo un símbolo gráfico. Las marcas que dominan su industria no lo hacen por tener el logo más bonito: lo hacen por tener la identidad más coherente.

    content: `# UX que Convierte: Diseñando Experiencias que Eliminan la Fricción

El diseño UX no es hacer que las cosas "se vean bien". Es hacer que funcionen tan bien que el usuario olvide que está usando un producto diseñado. La fricción —todo lo que interrumpe, confunde o frustra— es el enemigo número uno de la conversión.

## El costo real de la fricción

Cada segundo de espera innecesario, cada campo de formulario que no necesita estar ahí, cada mensaje de error críptico, cada flujo que requiere tres clics donde debería requerir uno: todo esto tiene un costo medible. Google descubrió que un retraso de 1 segundo en carga móvil reduce las conversiones en un 20%. Amazon calculó que cada 100ms de latencia cuesta un 1% de ventas.

## Los principios que guían nuestro proceso

**Claridad antes que creatividad**
Una interfaz creativa que confunde es un fracaso. Siempre. La claridad —que el usuario sepa exactamente dónde está, qué puede hacer y qué pasará si lo hace— es el fundamento sobre el cual se puede agregar complejidad y creatividad.

**Jerarquía visual explícita**
El ojo del usuario sigue patrones predecibles. El diseño debe dirigir ese recorrido hacia lo que importa: la llamada a la acción principal. Todo lo demás es soporte.

**Carga cognitiva mínima**
Cada decisión que le pides al usuario tomar consume energía mental. Nuestro trabajo es minimizar decisiones innecesarias y hacer que las necesarias sean lo más obvias posible.

**Feedback inmediato**
El usuario debe saber, en todo momento, que el sistema lo escuchó. Los estados de carga, los mensajes de confirmación, las animaciones de transición no son detalles: son comunicación.

2. **Arquitectura de información**: mapa del sitio, flujos de usuario, jerarquía de contenido
3. **Wireframes**: estructuras de baja fidelidad que prueban la lógica antes del diseño
4. **Prototipado**: prototipos interactivos que se pueden testear con usuarios reales
5. **Validación**: pruebas de usabilidad, análisis de resultados, iteración

## Métricas de éxito

Un buen diseño UX se mide. Las métricas que más nos importan: tasa de conversión, tiempo en tarea, tasa de error, Net Promoter Score y tasa de abandono por flujo.

    content: `# Sistema de Diseño: La Ventaja Competitiva Silenciosa de las Marcas Premium

Airbnb, Google, Apple, Shopify. Marcas que operan en decenas de mercados, con cientos de productos diferentes, manteniendo una coherencia visual y experiencial impecable. ¿Cuál es el secreto? No es talento extraordinario en cada equipo. Es infraestructura: un sistema de diseño que garantiza la coherencia sin necesitar supervisión constante.

## ¿Qué es un sistema de diseño?

Un sistema de diseño es un conjunto documentado de principios, componentes y guías que permiten a cualquier persona de la organización crear productos y materiales que se vean y funcionen como parte de la misma marca.

No es solo una guía de estilo. Es una infraestructura viva que incluye:

- **Design tokens**: los valores atómicos del sistema (colores, tipografías, espaciados, radios, sombras)
- **Biblioteca de componentes**: elementos de UI reutilizables (botones, formularios, tarjetas, modales)
- **Patrones de interacción**: cómo se comportan los componentes en diferentes contextos
- **Documentación**: principios, reglas de uso, ejemplos de qué hacer y qué no hacer
- **Código**: implementación en el o los frameworks que usa el equipo de desarrollo

## El costo de no tener un sistema

Imagina que tu empresa lanza un nuevo producto digital cada año. Sin un sistema de diseño, cada equipo empieza de cero: escoge tipografías, define colores, diseña botones. El resultado es inevitablemente inconsistente. Los clientes no lo ven como un nuevo producto: lo ven como una empresa desorganizada.

Con un sistema de diseño, el mismo lanzamiento tarda la mitad del tiempo, cuesta menos, y el resultado es coherente con todo lo demás que la marca ha construido.

## Los tres niveles de madurez

**Nivel 1 — Guía de estilo**: documento estático con especificaciones visuales. Útil pero limitado.

**Nivel 2 — Biblioteca de componentes**: componentes interactivos reutilizables en Figma y código. Reduce la inconsistencia y acelera el trabajo de diseño.

**Nivel 3 — Sistema vivo**: tokens centralizados, componentes versionados, documentación automatizada, gobernanza definida. Escala con la organización.

Si tu empresa está creciendo, es mejor construir el sistema antes de que la deuda de diseño se acumule.

El sistema de diseño no es un proyecto de diseño: es una inversión de ingeniería con retorno medible.

window.POSTS = POSTS;

window.loginGoogle = async function() {
  const log = document.getElementById('log');
  try {
    log.innerHTML += '<span class="ok">Abriendo popup de Google...\n</span>';
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(window._auth, provider);
    window._token = await result.user.getIdToken();
    window._user = result.user;
    const name = result.user.displayName || result.user.email;
    const photo = result.user.photoURL || '';
    log.innerHTML += '<span class="done">✓ Sesión iniciada como: ' + name + '\n</span>';
    if (photo) log.innerHTML += '<span class="ok">  📸 Foto de perfil: ' + photo.substring(0,60) + '...\n</span>';
    document.getElementById('btnUpdate').disabled = false;
    document.getElementById('btnSeed').disabled = false;
    document.getElementById('btnLogin').disabled = true;
  } catch(e) {
    log.innerHTML += '<span class="err">✗ Error: ' + e.message + '\n</span>';
  }
};

window.updateAuthorInfo = async function() {
  const log = document.getElementById('log');
  const btn = document.getElementById('btnUpdate');
  btn.disabled = true;
  btn.textContent = 'Actualizando...';

  const user = window._auth.currentUser;
  const authorName  = user.displayName || user.email;
  const authorImage = user.photoURL || '';
  const authorEmail = user.email;
  const authorId    = user.uid;

  log.innerHTML += '\n<span class="ok">→ Buscando posts existentes...\n</span>';

  try {
    const token = await user.getIdToken(true);
    const res = await fetch('/api/posts.php', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const posts = await res.json();
    if (!Array.isArray(posts)) throw new Error('Respuesta inesperada: ' + JSON.stringify(posts));

    log.innerHTML += '<span class="done">  ✓ ' + posts.length + ' posts encontrados\n</span>';
    log.innerHTML += '<span class="ok">→ Autor a asignar: ' + authorName + '\n</span>';

    let updated = 0;
    for (const post of posts) {
      try {
        const t = await user.getIdToken(true);
        const r = await fetch('/api/posts.php?id=' + post.id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + t },
          body: JSON.stringify({
            author:      authorName,
            authorImage: authorImage,
            author_id:   authorId,
            author_email: authorEmail
          })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'HTTP ' + r.status);
        updated++;
        log.innerHTML += '<span class="done">  ✓ "' + post.title.substring(0,45) + '..." actualizado\n</span>';
      } catch(e) {
        log.innerHTML += '<span class="err">  ✗ Post ' + post.id + ': ' + e.message + '\n</span>';
      }
      log.scrollTop = log.scrollHeight;
    }

    log.innerHTML += '\n<span class="done">══════════════════════════════\n';
    log.innerHTML += updated + '/' + posts.length + ' posts actualizados con autor: ' + authorName + '\n</span>';
    log.innerHTML += '<span class="ok">Recarga /blog para verificar.\n</span>';
  } catch(e) {
    log.innerHTML += '<span class="err">✗ Error: ' + e.message + '\n</span>';
  }

  btn.textContent = '✓ Completado';
};

window.seedPosts = async function() {
  const log = document.getElementById('log');
  const btn = document.getElementById('btnSeed');
  btn.disabled = true;
  btn.textContent = 'Publicando...';
  
  let created = 0;
  for (const post of window.POSTS) {
    try {
      log.innerHTML += '<span class="ok">→ Creando: ' + post.title.substring(0,50) + '...\n</span>';
      const token = await window._auth.currentUser.getIdToken(true);
      
      const res = await fetch('/api/posts.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          ...post,
          published: true,
          author_id: window._auth.currentUser.uid,
          author_email: window._auth.currentUser.email
        })
      });
      
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
      
      created++;
      log.innerHTML += '<span class="done">  ✓ Publicado (id: ' + (data.id || 'ok') + ')\n</span>';
    } catch(e) {
      log.innerHTML += '<span class="err">  ✗ Error: ' + e.message + '\n</span>';
    }
    log.scrollTop = log.scrollHeight;
  }
  
  log.innerHTML += '\n<span class="done">══════════════════════════════\n';
  log.innerHTML += created + '/5 posts publicados correctamente.\n</span>';
  
  if (created > 0) {
    log.innerHTML += '<span class="ok">Puedes ir a /blog para verlos.\n</span>';
  }
  
  btn.textContent = '✓ Completado';
};
</script>
